<html lang="en">

        * {

            padding: 0;
            box-sizing: border-box;

        body {
            font-family: 'Sohne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(120deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .tables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .section {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .section:nth-child(2) {
            animation-delay: 0.2s;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 12px;
        }

        .person-name {
            font-size: 2rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .person-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .person-indicator.paigeos {
            background: #60a5fa;
        }

        .person-indicator.briso {
            background: #a78bfa;
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .entry {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .entry:hover {
            border-color: rgba(148, 163, 184, 0.5);
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .entry-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .image-upload {
            margin-bottom: 16px;
        }

        .image-upload input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            padding: 10px 16px;
            background: rgba(96, 165, 250, 0.15);
            border: 1px dashed #60a5fa;
            border-radius: 8px;
            color: #60a5fa;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .upload-btn:hover {
            background: rgba(96, 165, 250, 0.25);
            border-color: #3b82f6;
        }

        .section:nth-child(2) .upload-btn {
            border-color: #a78bfa;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
        }

        .section:nth-child(2) .upload-btn:hover {
            background: rgba(167, 139, 250, 0.25);
            border-color: #9333ea;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.8);
        }

            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);

            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }
