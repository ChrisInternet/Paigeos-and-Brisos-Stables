<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paigeos and Brisos Stables</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Sohne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(120deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .login-section {
            max-width: 400px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .login-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .login-input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #60a5fa;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }

        .login-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .tables {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .section {
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .section:nth-child(2) {
            animation-delay: 0.2s;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            gap: 12px;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .person-name {
            font-size: 2rem;
            font-weight: 700;
            color: #f1f5f9;
        }

        .person-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .person-indicator.paigeos {
            background: #60a5fa;
        }

        .person-indicator.briso {
            background: #a78bfa;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .entry {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .entry:hover {
            border-color: rgba(148, 163, 184, 0.5);
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .entry-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .sync-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .sync-indicator.syncing {
            color: #60a5fa;
        }

        .image-upload {
            margin-bottom: 16px;
        }

        .image-upload input[type="file"] {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            padding: 10px 16px;
            background: rgba(96, 165, 250, 0.15);
            border: 1px dashed #60a5fa;
            border-radius: 8px;
            color: #60a5fa;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .upload-btn:hover {
            background: rgba(96, 165, 250, 0.25);
            border-color: #3b82f6;
        }

        .section:nth-child(2) .upload-btn {
            border-color: #a78bfa;
            color: #a78bfa;
            background: rgba(167, 139, 250, 0.15);
        }

        .section:nth-child(2) .upload-btn:hover {
            background: rgba(167, 139, 250, 0.25);
            border-color: #9333ea;
        }

        .image-preview {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.8);
        }

        .comment-input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        .comment-input:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .section:nth-child(2) .comment-input:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: #60a5fa;
            color: #0f172a;
        }

        .btn-save:hover {
            background: #3b82f6;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
        }

        .section:nth-child(2) .btn-save {
            background: #a78bfa;
        }

        .section:nth-child(2) .btn-save:hover {
            background: #9333ea;
            box-shadow: 0 4px 12px rgba(167, 139, 250, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: translateY(-1px);
        }

        .empty-image {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .tables {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            h1 {
                font-size: 2.5rem;
            }

            .person-name {
                font-size: 1.5rem;
            }

            .section-header {
                flex-wrap: wrap;
            }
        }

        footer {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Paigeos and Brisos Stables</h1>
            <p class="subtitle">A collaborative collection of moments & thoughts</p>
        </header>

        <!-- LOGIN SECTION -->
        <div id="loginSection" class="login-section">
            <h2>Welcome!</h2>
            <p style="color: #94a3b8; margin-bottom: 20px; text-align: center; font-size: 0.9rem;">
                Choose your name to get started
            </p>
            <input type="email" id="emailInput" class="login-input" placeholder="Enter email">
            <input type="password" id="passwordInput" class="login-input" placeholder="Enter password">
            <button class="login-btn" onclick="handleLogin()">Login / Sign Up</button>
            <p style="color: #64748b; margin-top: 15px; text-align: center; font-size: 0.85rem;">
                💡 Use any email & password (will create account if new)
            </p>
        </div>

        <!-- MAIN APP SECTION (hidden until login) -->
        <div id="appSection" class="hidden">
            <div class="tables">
                <!-- PAIGEOS SECTION -->
                <section class="section" id="paigeos-section">
                    <div class="section-header">
                        <div class="header-left">
                            <span class="person-name">Paigeos</span>
                            <div class="person-indicator paigeos"></div>
                        </div>
                        <button class="logout-btn" onclick="handleLogout()">Logout</button>
                    </div>
                    <div class="entries-list" id="paigeos-list"></div>
                </section>

                <!-- BRISO SECTION -->
                <section class="section" id="briso-section">
                    <div class="section-header">
                        <div class="header-left">
                            <span class="person-name">Briso</span>
                            <div class="person-indicator briso"></div>
                        </div>
                    </div>
                    <div class="entries-list" id="briso-list"></div>
                </section>
            </div>
        </div>

        <footer>
            <p id="footerText">💾 Sign in to start collaborating</p>
        </footer>
    </div>

    <!-- Firebase SDK v9+ (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD2MRqUjrHFcRddKCKdiQKc7t3xxNONWlU",
            authDomain: "paigeos-briso.firebaseapp.com",
            databaseURL: "https://paigeos-briso-default-rtdb.firebaseio.com",
            projectId: "paigeos-briso",
            storageBucket: "paigeos-briso.firebasestorage.app",
            messagingSenderId: "93001788122",
            appId: "1:93001788122:web:6974bbb2429bb0df9393e3",
            measurementId: "G-081PE55KRM"
        };

        let currentUser = null;
        const ENTRIES_COUNT = 5;

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        // Handle Login
        async function handleLogin() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            try {
                // Try to sign in, if fails, create account
                try {
                    await firebase.auth().signInWithEmailAndPassword(email, password);
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        await firebase.auth().createUserWithEmailAndPassword(email, password);
                    } else {
                        throw error;
                    }
                }

                currentUser = firebase.auth().currentUser;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                document.getElementById('footerText').textContent = '🔄 Real-time sync enabled - updates visible to both users';
                loadEntries();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Handle Logout
        function handleLogout() {
            firebase.auth().signOut().then(() => {
                currentUser = null;
                document.getElementById('appSection').classList.add('hidden');
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('emailInput').value = '';
                document.getElementById('passwordInput').value = '';
                document.getElementById('footerText').textContent = '💾 Sign in to start collaborating';
            });
        }

        // Load entries from Firebase
        function loadEntries() {
            const paigeosList = document.getElementById('paigeos-list');
            const brisoList = document.getElementById('briso-list');

            // Listen for Paigeos entries
            firebase.database().ref('entries/paigeos').on('value', (snapshot) => {
                const entries = snapshot.val() || {};
                renderEntries('paigeos', entries, paigeosList);
            });

            // Listen for Briso entries
            firebase.database().ref('entries/briso').on('value', (snapshot) => {
                const entries = snapshot.val() || {};
                renderEntries('briso', entries, brisoList);
            });
        }

        // Render entries
        function renderEntries(person, entries, container) {
            container.innerHTML = '';

            for (let i = 1; i <= ENTRIES_COUNT; i++) {
                const entry = entries[`entry${i}`] || { image: null, comment: '' };
                const entryDiv = document.createElement('div');
                entryDiv.className = 'entry';
                entryDiv.innerHTML = `
                    <div class="entry-number">Picture ${i}</div>
                    <div class="sync-indicator">syncing...</div>
                    
                    <div class="image-upload">
                        <input type="file" class="image-input" accept="image/*" data-person="${person}" data-index="${i}">
                        ${entry.image 
                            ? `<img src="${entry.image}" class="image-preview" alt="Entry ${i}">` 
                            : `<div class="empty-image">Click to upload image</div>`
                        }
                        <label class="upload-btn" style="cursor: pointer;">
                            📸 ${entry.image ? 'Change Image' : 'Upload Image'}
                            <input type="file" class="image-input" accept="image/*" data-person="${person}" data-index="${i}" style="display: none;">
                        </label>
                    </div>

                    <textarea class="comment-input" placeholder="Add your comment here..." data-person="${person}" data-index="${i}">${entry.comment || ''}</textarea>

                    <div class="button-group">
                        <button class="btn btn-save" data-person="${person}" data-index="${i}">✓ Save</button>
                        <button class="btn btn-delete" data-person="${person}" data-index="${i}">🗑 Clear</button>
                    </div>
                `;

                container.appendChild(entryDiv);
            }

            attachEventListeners(person);
        }

        // Attach event listeners
        function attachEventListeners(person) {
            const container = document.querySelector(`#${person}-list`);

            // File input
            container.querySelectorAll('.image-input').forEach(input => {
                input.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const index = e.target.dataset.index;
                            firebase.database().ref(`entries/${person}/entry${index}/image`).set(event.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
                });
            });

            // Save button
            container.querySelectorAll('.btn-save').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.target.dataset.index;
                    const comment = e.target.closest('.entry').querySelector('.comment-input').value;
                    firebase.database().ref(`entries/${person}/entry${index}/comment`).set(comment);
                });
            });

            // Delete button
            container.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = e.target.dataset.index;
                    firebase.database().ref(`entries/${person}/entry${index}`).set({ image: null, comment: '' });
                });
            });
        }

        // Check auth state on load
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                document.getElementById('footerText').textContent = '🔄 Real-time sync enabled - updates visible to both users';
                loadEntries();
            }
        });
    </script>
</body>
</html>
